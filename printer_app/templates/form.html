{% extends "base_layout.html" %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<main>
  <div class="card">
    <h2>{{ title }}</h2>
    <form method="post">
      <label for="name">Printer Name</label>
      <input type="text" id="name" name="name" required placeholder="e.g. Counter-1 Receipt" value="{{ printer.name if printer else '' }}" style="width:100%; padding:.5rem; margin-bottom:1rem; border:1px solid #ddd; border-radius:4px;">
      
      <label for="ip">Printer IP Address</label>
      <input type="text" id="ip" name="ip" required placeholder="e.g. 192.168.0.101" value="{{ printer.ip if printer else '' }}" style="width:100%; padding:.5rem; margin-bottom:1rem; border:1px solid #ddd; border-radius:4px;">

      {% if printer %}
      <div style="display: flex; align-items: center; gap: .75rem; margin-bottom: 1.5rem;">
        <input type="checkbox" id="enabled" name="enabled" value="1" {{ 'checked' if printer.enabled else '' }}>
        <label for="enabled" style="margin:0;">Enabled (polling active)</label>
      </div>
      {% else %}
      <input type="hidden" name="enabled" value="1" />
      {% endif %}

      <div style="display: flex; gap: .75rem;">
        <button type="submit" style="background: #0f3460; color: #fff; padding: .6rem 1.5rem; border-radius: 6px; border: none; cursor: pointer;">Save</button>
        <a href="{{ url_for('index') }}" style="background: #e5e7eb; color: #374151; padding: .6rem 1.2rem; border-radius: 6px; text-decoration: none;">Cancel</a>
      </div>
    </form>
  </div>
</main>
{% endblock %}
