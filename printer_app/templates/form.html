<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }} — Printer Manager</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><text y='22' font-size='20'>🖨️</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #16213e;
      color: #fff;
      padding: 0.8rem 2rem;
    }
    .header-title-group { display: flex; flex-direction: column; }
    header h1 { font-size: 1.2rem; letter-spacing: .05em; line-height: 1.1; }
    .app-version { font-size: 0.65rem; color: #9ca3af; margin-top: 0.2rem; }

    main { max-width: 560px; margin: 2.5rem auto; padding: 0 1rem; }

    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      padding: 2rem;
    }
    .card h2 { margin-bottom: 1.5rem; font-size: 1.15rem; color: #16213e; }

    label {
      display: block;
      font-size: .82rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: .3rem;
    }

    input[type=text], input[type=number] {
      width: 100%;
      padding: .55rem .8rem;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: .92rem;
      margin-bottom: 1.1rem;
      transition: border-color .2s;
    }
    input:focus { outline: none; border-color: #0f3460; }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-bottom: 1.5rem;
    }
    .toggle-row label { margin: 0; }

    .btn-row {
      display: flex;
      gap: .75rem;
    }
    button[type=submit] {
      background: #0f3460;
      color: #fff;
      border: none;
      padding: .6rem 1.5rem;
      border-radius: 6px;
      font-size: .92rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    button[type=submit]:hover { background: #16213e; }
    a.btn-cancel {
      background: #e5e7eb;
      color: #374151;
      padding: .6rem 1.2rem;
      border-radius: 6px;
      font-size: .92rem;
      font-weight: 600;
      text-decoration: none;
      transition: background .2s;
    }
    a.btn-cancel:hover { background: #d1d5db; }
  </style>
</head>
<body>

<header>
  <a href="{{ url_for('index') }}" style="text-decoration:none; color:inherit;">
    <div class="header-title-group">
      <h1>&#128438; Printer Manager — {{ title }}</h1>
      <span class="app-version">Version {{ version }}</span>
    </div>
  </a>
</header>

<main>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div style="padding: 1rem; margin-bottom: 1rem; border-radius: 6px; background: {% if category == 'success' %}#d1fae5; color: #047857{% else %}#fee2e2; color: #b91c1c{% endif %}; text-align: center; font-weight: 500;">
          {{ message }}
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}
  <div class="card">
    <h2>{{ title }}</h2>
    <form method="post">

      <label for="name">Printer Name</label>
      <input type="text" id="name" name="name" required
             placeholder="e.g. Counter-1 Receipt"
             value="{{ printer.name if printer else '' }}" />

      <label for="ip">Printer IP Address</label>
      <input type="text" id="ip" name="ip" required
             placeholder="e.g. 192.168.0.101"
             value="{{ printer.ip if printer else '' }}" />

      {% if printer %}
      <div class="toggle-row">
        <input type="checkbox" id="enabled" name="enabled" value="1"
               {{ 'checked' if printer.enabled else '' }}>
        <label for="enabled">Enabled (polling active)</label>
      </div>
      {% else %}
      <input type="hidden" name="enabled" value="1" />
      {% endif %}

      <div class="btn-row">
        <button type="submit">Save</button>
        <a href="{{ url_for('index') }}" class="btn-cancel">Cancel</a>
      </div>
    </form>
  </div>
</main>

</body>
</html>
