<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Printer Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .login-card {
      background: #fff;
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,.1);
      width: 100%;
      max-width: 400px;
    }
    .login-card h2 {
      margin-bottom: 1.5rem;
      text-align: center;
      color: #16213e;
    }
    .form-group {
      margin-bottom: 1rem;
    }
    .form-group label {
      display: block;
      margin-bottom: .5rem;
      font-size: .9rem;
      font-weight: 600;
    }
    .form-group input {
      width: 100%;
      padding: .6rem;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 1rem;
    }
    .btn-login {
      width: 100%;
      padding: .75rem;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1rem;
    }
    .btn-login:hover { background: #d63d58; }
    .error {
      color: #b91c1c;
      background: #fee2e2;
      padding: .75rem;
      border-radius: 5px;
      margin-bottom: 1rem;
      font-size: .9rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h2>Printer Manager</h2>
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>
      <button type="submit" class="btn-login">Login</button>
    </form>
  </div>
</body>
</html>
