<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Master Settings — Printer Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #16213e;
      color: #fff;
      padding: 0.8rem 2rem;
    }
    .header-title-group { display: flex; flex-direction: column; }
    header h1 { font-size: 1.2rem; letter-spacing: .05em; line-height: 1.1; }
    .app-version { font-size: 0.65rem; color: #9ca3af; margin-top: 0.2rem; }

    main { max-width: 560px; margin: 2.5rem auto; padding: 0 1rem; }

    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      padding: 2rem;
    }
    .card h2 { margin-bottom: 1.5rem; font-size: 1.15rem; color: #16213e; }

    label {
      display: block;
      font-size: .82rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: .3rem;
    }

    input[type=text], input[type=number], input[type=password] {
      width: 100%;
      padding: .55rem .8rem;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: .92rem;
      margin-bottom: 1.1rem;
      transition: border-color .2s;
    }
    input:focus { outline: none; border-color: #0f3460; }

    .btn-row {
      display: flex;
      gap: .75rem;
    }
    button[type=submit] {
      background: #0f3460;
      color: #fff;
      border: none;
      padding: .6rem 1.5rem;
      border-radius: 6px;
      font-size: .92rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    button[type=submit]:hover { background: #16213e; }
    a.btn-cancel {
      background: #e5e7eb;
      color: #374151;
      padding: .6rem 1.2rem;
      border-radius: 6px;
      font-size: .92rem;
      font-weight: 600;
      text-decoration: none;
      transition: background .2s;
    }
    a.btn-cancel:hover { background: #d1d5db; }
    
    .help-text {
      font-size: 0.75rem;
      color: #6b7280;
      margin-top: -0.8rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>

<header>
  <div class="header-title-group">
    <h1>&#128438; Printer Manager — Master Settings</h1>
    <span class="app-version">Version {{ version }}</span>
  </div>
</header>

<main>
  <div class="card">
    <h2>Master Configuration</h2>
    <p class="help-text">These settings apply to all configured printers.</p>
    <form method="post">

      <label for="odoo_url">Source URL (Odoo / API base URL)</label>
      <input type="text" id="odoo_url" name="odoo_url" required
             placeholder="e.g. https://your-odoo.example.com"
             value="{{ settings.odoo_url }}" />

      <label for="api_key">Access Token / API Key</label>
      <input type="text" id="api_key" name="api_key" required
             placeholder="Bearer token or API key"
             value="{{ settings.api_key }}" />

      <label for="company_id">Company ID</label>
      <input type="number" id="company_id" name="company_id" required
             placeholder="1"
             min="1"
             value="{{ settings.company_id }}" />

      <label for="allowed_ip">Allowed Client IP Address (Restricts Web UI Access)</label>
      <input type="text" id="allowed_ip" name="allowed_ip"
             placeholder="e.g. 192.168.1.50 (leave empty to allow all)"
             value="{{ settings.allowed_ip }}" />
      <p class="help-text">If set, only this IP will be able to access the application UI. Leave blank to disable this restriction.</p>

      <div class="btn-row">
        <button type="submit">Save Settings</button>
        <a href="{{ url_for('index') }}" class="btn-cancel">Cancel</a>
      </div>
    </form>
  </div>
</main>

</body>
</html>
