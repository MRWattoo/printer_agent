{% extends "base_layout.html" %}
{% block title %}Master Settings{% endblock %}
{% block content %}
  <div class="card">
    <h2>Master Configuration</h2>
    <p style="font-size: 0.75rem; color: #6b7280; margin-bottom: 1rem;">These settings apply to all configured printers.</p>
    <form method="post">
      <label for="odoo_url">Source URL (Odoo / API base URL)</label>
      <input type="text" id="odoo_url" name="odoo_url" required placeholder="e.g. https://your-odoo.example.com" value="{{ settings.odoo_url }}" style="width:100%; padding:.5rem; border:1px solid #ddd; border-radius:4px; margin-bottom:1rem;">

      <label for="api_key">Access Token / API Key</label>
      <input type="text" id="api_key" name="api_key" required placeholder="Bearer token or API key" value="{{ settings.api_key }}" style="width:100%; padding:.5rem; border:1px solid #ddd; border-radius:4px; margin-bottom:1rem;">

      <label for="company_id">Company ID</label>
      <input type="number" id="company_id" name="company_id" required placeholder="1" min="1" value="{{ settings.company_id }}" style="width:100%; padding:.5rem; border:1px solid #ddd; border-radius:4px; margin-bottom:1rem;">

      <div class="btn-row" style="margin-top:1rem;">
        <button type="submit" style="background:#0f3460; color:#fff; padding:0.6rem 1.5rem; border:none; border-radius:6px; cursor:pointer;">Save Settings</button>
        <a href="{{ url_for('index') }}" style="background:#e5e7eb; color:#374151; padding:0.6rem 1.2rem; border-radius:6px; text-decoration:none;">Cancel</a>
      </div>
    </form>
  </div>
{% endblock %}
