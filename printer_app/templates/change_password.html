<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Change Password - Printer Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }
    header {
      background: #16213e;
      color: #fff;
      padding: 1rem 2rem;
    }
    header h1 { font-size: 1.3rem; }
    main { max-width: 560px; margin: 2.5rem auto; padding: 0 1rem; }
    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      padding: 2rem;
    }
    .card h2 { margin-bottom: 1.5rem; font-size: 1.15rem; color: #16213e; }
    .form-group { margin-bottom: 1.1rem; }
    label {
      display: block;
      font-size: .82rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: .3rem;
    }
    input[type=password] {
      width: 100%;
      padding: .55rem .8rem;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: .92rem;
      transition: border-color .2s;
    }
    input:focus { outline: none; border-color: #0f3460; }
    .btn-row {
      display: flex;
      gap: .75rem;
      margin-top: 1.5rem;
    }
    button[type=submit] {
      background: #0f3460;
      color: #fff;
      border: none;
      padding: .6rem 1.5rem;
      border-radius: 6px;
      font-size: .92rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    button[type=submit]:hover { background: #16213e; }
    a.btn-cancel {
      background: #e5e7eb;
      color: #374151;
      padding: .6rem 1.2rem;
      border-radius: 6px;
      font-size: .92rem;
      font-weight: 600;
      text-decoration: none;
      transition: background .2s;
    }
    a.btn-cancel:hover { background: #d1d5db; }
    .error {
      background: #fee2e2;
      color: #b91c1c;
      padding: .75rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      font-size: .9rem;
    }
  </style>
</head>
<body>

<header>
  <h1>&#128438; Printer Manager — Change Password</h1>
</header>

<main>
  <div class="card">
    <h2>
      {% if own_password %}
        Change Your Password
      {% else %}
        Change Password for {{ user.username }}
      {% endif %}
    </h2>
    
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    
    <form method="post">
      {% if own_password %}
      <div class="form-group">
        <label for="current_password">Current Password</label>
        <input type="password" id="current_password" name="current_password" required>
      </div>
      {% endif %}
      
      <div class="form-group">
        <label for="new_password">
          {% if own_password %}
            New Password
          {% else %}
            New Password
          {% endif %}
        </label>
        <input type="password" id="new_password" name="new_password" required>
      </div>
      
      <div class="btn-row">
        <button type="submit">Change Password</button>
        {% if own_password %}
          <a href="{{ url_for('index') }}" class="btn-cancel">Cancel</a>
        {% else %}
          <a href="{{ url_for('users_management') }}" class="btn-cancel">Cancel</a>
        {% endif %}
      </div>
    </form>
  </div>
</main>

</body>
</html>
