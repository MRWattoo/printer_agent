{% extends "base_layout.html" %}
{% block title %}Change Password{% endblock %}
{% block content %}
  <div class="card">
    <h2>Change Password</h2>
    <form method="post">
      {% if own_password %}
        <label for="current_password">Current Password</label>
        <input type="password" id="current_password" name="current_password" required style="width:100%; padding:.5rem; margin-bottom:1rem; border:1px solid #ddd; border-radius:4px;">
      {% endif %}
      <label for="new_password">New Password</label>
      <input type="password" id="new_password" name="new_password" required style="width:100%; padding:.5rem; margin-bottom:1rem; border:1px solid #ddd; border-radius:4px;">
      <label for="confirm_password">Confirm New Password</label>
      <input type="password" id="confirm_password" name="confirm_password" required style="width:100%; padding:.5rem; margin-bottom:1rem; border:1px solid #ddd; border-radius:4px;">
      <div class="btn-row">
        <button type="submit" style="background:#0f3460; color:#fff; padding:0.6rem 1.5rem; border:none; border-radius:6px; cursor:pointer;">Change Password</button>
        <a href="{{ url_for('index') }}" class="btn-cancel" style="background:#e5e7eb; color:#374151; padding:0.6rem 1.2rem; border-radius:6px; text-decoration:none;">Cancel</a>
      </div>
    </form>
  </div>
{% endblock %}
