<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Management - Printer Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }
    header {
      background: #16213e;
      color: #fff;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 1.3rem; }
    nav a { color: #fff; text-decoration: none; margin-left: 1rem; font-size: .9rem; }
    main { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      padding: 1.5rem;
      margin-bottom: 2rem;
    }
    .card h2 { margin-bottom: 1rem; font-size: 1.2rem; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th { text-align: left; padding: .75rem; border-bottom: 2px solid #f0f2f5; font-size: .9rem; }
    td { padding: .75rem; border-bottom: 1px solid #f0f2f5; font-size: .9rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; margin-bottom: .4rem; font-size: .85rem; font-weight: 600; }
    .form-group input, .form-group select {
      width: 100%;
      padding: .5rem;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    .btn {
      padding: .5rem 1rem;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-size: .85rem;
    }
    .btn-primary { background: #0f3460; color: #fff; }
    .btn-danger { background: #fee2e2; color: #b91c1c; }
    .error { color: #b91c1c; font-size: .85rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
<header>
  <h1>User Management</h1>
  <nav>
    <a href="{{ url_for('index') }}">Back to Printers</a>
    <a href="{{ url_for('logout') }}">Logout</a>
  </nav>
</header>
<main>
  <div class="card">
    <h2>Add New User</h2>
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>
      <div class="form-group">
        <label for="role">Role</label>
        <select id="role" name="role">
          <option value="user">User (Add/Archive Only)</option>
          <option value="admin">Admin (Full Access)</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary">Create User</button>
    </form>
  </div>

  <div class="card">
    <h2>Existing Users</h2>
    <table>
      <thead>
        <tr>
          <th>Username</th>
          <th>Role</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for u in users %}
        <tr>
          <td>{{ u.username }}</td>
          <td>{{ u.role }}</td>
          <td>
            {% if u.username != 'wattoo' %}
            <form method="post" action="{{ url_for('delete_user', user_id=u.id) }}" onsubmit="return confirm('Delete user {{ u.username }}?')">
              <button type="submit" class="btn btn-danger">Delete</button>
            </form>
            {% endif %}
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</main>
</body>
</html>
