{% extends "base_layout.html" %}
{% block title %}Logs{% endblock %}
{% block content %}
<main>
  <div class="card">
    <h2>Print Logs (Last 24 Hours)</h2>
    <table style="width: 100%; border-collapse: collapse; margin-top: 1rem;">
      <thead>
        <tr style="background: #16213e; color: #fff; text-align: left;">
          <th style="padding: 1rem;">Time</th>
          <th style="padding: 1rem;">Printer</th>
          <th style="padding: 1rem;">Status</th>
          <th style="padding: 1rem;">Reason</th>
        </tr>
      </thead>
      <tbody>
        {% for log in logs %}
        <tr style="border-bottom: 1px solid #eee;">
          <td style="padding: 1rem;">{{ log.timestamp }}</td>
          <td style="padding: 1rem;">{{ log.printer_name }}</td>
          <td style="padding: 1rem;">
            <span class="badge {% if log.status == 'success' %}badge-running{% else %}badge-offline{% endif %}">
              {{ log.status|capitalize }}
            </span>
          </td>
          <td style="padding: 1rem;">{{ log.reason }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</main>
{% endblock %}
